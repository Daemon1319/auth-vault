spring.application.name=auth-vault
server.port=${PORT:8081}

# ── Azure reverse-proxy support ──
# Azure App Service fronts your app with a load balancer.
# This ensures X-Forwarded-* headers are trusted so the app
# sees the real client IP and HTTPS scheme (critical for Secure cookies).
server.forward-headers-strategy=NATIVE

# ── Graceful shutdown (Azure sends SIGTERM on redeploy) ──
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ── Neon PostgreSQL (credentials from Azure App Settings) ──
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Neon requires SSL
spring.datasource.hikari.data-source-properties.sslmode=require

# HikariCP tuning for Neon serverless (limited connections)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:5}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT Security Configurations
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry-ms=${JWT_ACCESS_EXPIRY:30000}
jwt.refresh-token-expiry-ms=${JWT_REFRESH_EXPIRY:604800000}

# Cookie Security (true in production on Azure HTTPS)
app.cookie.secure=${COOKIE_SECURE:true}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}

# CORS — comma-separated allowed origins
# Set via Azure App Settings for production, e.g. https://yourfrontend.azurestaticapps.net
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Actuator (health probes for Azure) ──
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never